name: Build HAMO.dylib
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract project
        run: unzip *.zip
      - name: List files
        run: find . -name "*.m" -o -name "*.x" | grep -i hamo
      - name: Compile HAMO.dylib
        run: SRC=$(find . -name "HamoWelcome.m" | head -1) && CTR=$(find . -name "HamoWelcomeController.m" | head -1) && HDR=$(find . -name "HamoWelcomeController.h" | head -1 | xargs dirname) && SDK=$(xcrun --sdk iphoneos --show-sdk-path) && clang -arch arm64 -isysroot "$SDK" -mios-version-min=15.0 -dynamiclib -framework UIKit -framework Foundation -fobjc-arc -I "$HDR" -o HAMO.dylib "$SRC" "$CTR"
      - name: Sign
        run: brew install ldid --quiet && ldid -S HAMO.dylib
      - name: Upload HAMO.dylib
        uses: actions/upload-artifact@v4
        with:
          name: HAMO-dylib
          path: HAMO.dylib
          retention-days: 30
