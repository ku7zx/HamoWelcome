name: Build HamoWelcome Dylib
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        uses: actions/cache@v3
        with:
          path: /opt/theos
          key: theos-${{ runner.os }}

      - name: Install Theos
        run: |
          set -e
          if [ ! -d /opt/theos ]; then
            sudo mkdir -p /opt/theos
            sudo chown $USER /opt/theos
            git clone --recursive https://github.com/theos/theos.git /opt/theos
          fi
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "/opt/theos/bin" >> $GITHUB_PATH

      - name: Install SDK
        run: |
          sudo mkdir -p /opt/theos/sdks
          sudo chown -R $USER /opt/theos/sdks
          curl -fsSL -o sdk.tar.xz \
            https://github.com/theos/sdks/releases/download/0100/iPhoneOS16.2.sdk.tar.xz
          tar -xf sdk.tar.xz -C /opt/theos/sdks/

      - name: Install tools
        run: |
          brew install ldid dpkg --quiet

      - name: Extract project
        run: |
          unzip HamoWelcome.zip -d extracted/

      - name: Build dylib
        run: |
          export THEOS=/opt/theos
          export PATH=/opt/theos/bin:$PATH
          cd extracted/HamoWelcome
          make FINALPACKAGE=1 2>&1

      - name: Package deb
        run: |
          export THEOS=/opt/theos
          export PATH=/opt/theos/bin:$PATH
          cd extracted/HamoWelcome
          make package FINALPACKAGE=1 2>&1

      - name: Collect HAMO.dylib
        run: |
          mkdir -p final_output
          find extracted/HamoWelcome/.theos -name "*.dylib" \
            -exec cp {} final_output/HAMO.dylib \; 2>/dev/null || true
          find extracted/HamoWelcome/packages -name "*.deb" \
            -exec cp {} final_output/ \; 2>/dev/null || true
          ls -la final_output/

      - name: Upload HAMO.dylib
        uses: actions/upload-artifact@v4
        with:
          name: HAMO-dylib
          path: final_output/
          retention-days: 30
