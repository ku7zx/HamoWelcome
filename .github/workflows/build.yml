name: Build HamoWelcome Dylib
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: /home/runner/theos

    steps:
      - uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive \
            https://github.com/theos/theos.git \
            /home/runner/theos

      - name: Download iOS SDK
        run: |
          curl -fL \
            https://github.com/theos/sdks/releases/download/0100/iPhoneOS16.2.sdk.tar.xz \
            | tar xJf - -C /home/runner/theos/sdks/

      - name: Install build tools
        run: brew install dpkg ldid --quiet

      - name: Extract project
        run: unzip HamoWelcome.zip

      - name: Build dylib
        run: |
          cd HamoWelcome
          make FINALPACKAGE=1

      - name: Package deb
        run: |
          cd HamoWelcome
          make package FINALPACKAGE=1

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: HAMO-dylib
          path: HamoWelcome/packages/
          retention-days: 30
